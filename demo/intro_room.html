<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>YAAT Demo Intro Room</title>
  <style>
    :root {
      color-scheme: dark;
      --panel: #151923;
      --ink: #f5f0dc;
      --muted: #b9c0cf;
      --accent: #ffcc66;
      --missing: #ff66a3;
      --hotspot: #66d9ef;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #090b10;
      color: var(--ink);
      font: 16px/1.4 system-ui, sans-serif;
    }
    main {
      width: min(960px, calc(100vw - 32px));
    }
    .shell {
      border: 2px solid #30384a;
      background: var(--panel);
      box-shadow: 0 16px 60px rgba(0, 0, 0, .5);
      padding: 16px;
    }
    .room {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      image-rendering: pixelated;
      border: 2px solid #59647a;
      background: #1f2633;
    }
    .room::before {
      content: attr(data-title);
      position: absolute;
      left: 14px;
      top: 12px;
      z-index: 2;
      color: rgba(245, 240, 220, .75);
      letter-spacing: .08em;
      text-transform: uppercase;
      font-size: clamp(10px, 1.5vw, 13px);
    }
    .entity {
      position: absolute;
      border: 2px dashed var(--missing);
      background: repeating-linear-gradient(135deg, rgba(255,102,163,.18), rgba(255,102,163,.18) 8px, rgba(255,255,255,.06) 8px, rgba(255,255,255,.06) 16px);
      color: white;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 4px;
      box-sizing: border-box;
      font: 700 clamp(9px, 1.5vw, 13px)/1.15 ui-monospace, monospace;
      text-shadow: 0 1px 2px black;
    }
    .entity.hotspot {
      border-color: var(--hotspot);
      background: rgba(102, 217, 239, .16);
    }
    .entity img {
      width: 100%;
      height: 100%;
      object-fit: fill;
      display: block;
    }
    .entity.has-art {
      border-style: solid;
      background: transparent;
      padding: 0;
    }
    .caption {
      min-height: 52px;
      margin-top: 12px;
      padding: 12px 14px;
      border: 1px solid #3b4558;
      background: #0f1219;
      color: var(--muted);
    }
    .caption strong { color: var(--accent); }
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 18px;
      margin: 12px 0 0;
      padding: 0;
      list-style: none;
      color: var(--muted);
      font-size: 14px;
    }
    .swatch {
      display: inline-block;
      width: 12px;
      height: 12px;
      margin-right: 6px;
      border: 2px dashed var(--missing);
      vertical-align: -2px;
    }
    .swatch.hotspot { border-color: var(--hotspot); background: rgba(102,217,239,.16); }
    .swatch.art { border-style: solid; border-color: #f0dfaa; background: #f0dfaa; }
  </style>
</head>
<body>
  <main class="shell">
    <h1>YAAT Intro Room Demo</h1>
    <div id="room" class="room" data-title="Loading"></div>
    <div id="caption" class="caption">Loading room data...</div>
    <ul class="legend">
      <li><span class="swatch art"></span>Loaded graphic</li>
      <li><span class="swatch"></span>Missing graphic placeholder</li>
      <li><span class="swatch hotspot"></span>Hotspot/no-sprite placeholder</li>
    </ul>
  </main>
  <script>
    const fallbackRoom = {
      id: 'intro', title: 'Intro Room', size: { width: 640, height: 360 },
      fallbackColor: '#1f2633', background: 'assets/rooms/intro/background.bmp',
      description: 'Fallback copy of the intro room. Run through a web server to load assets/rooms/intro/room.json.',
      entities: []
    };

    const resolveAsset = (path) => new URL('../' + path, window.location.href).href;
    const roomEl = document.getElementById('room');
    const captionEl = document.getElementById('caption');

    function setCaption(entity, missing) {
      captionEl.innerHTML = `<strong>${entity.name}</strong> (${entity.kind}) — ${missing ? 'placeholder active: missing or intentionally omitted art.' : 'graphic loaded.'}`;
    }

    function addPlaceholderText(el, entity) {
      el.textContent = entity.placeholder || entity.name || entity.id;
      el.title = `${entity.name} [${entity.id}]`;
    }

    function drawEntity(room, entity) {
      const el = document.createElement('button');
      el.type = 'button';
      el.className = `entity ${entity.kind || 'object'}`;
      el.style.left = `${(entity.x / room.size.width) * 100}%`;
      el.style.top = `${(entity.y / room.size.height) * 100}%`;
      el.style.width = `${(entity.width / room.size.width) * 100}%`;
      el.style.height = `${(entity.height / room.size.height) * 100}%`;
      addPlaceholderText(el, entity);
      el.addEventListener('click', () => setCaption(entity, !el.classList.contains('has-art')));

      if (entity.sprite) {
        const img = new Image();
        img.alt = entity.name;
        img.onload = () => {
          el.textContent = '';
          el.classList.add('has-art');
          el.appendChild(img);
        };
        img.onerror = () => addPlaceholderText(el, entity);
        img.src = resolveAsset(entity.sprite);
      }
      roomEl.appendChild(el);
    }

    function drawRoom(room) {
      roomEl.dataset.title = room.title || room.id;
      roomEl.style.backgroundColor = room.fallbackColor || '#1f2633';
      captionEl.innerHTML = `<strong>${room.title}</strong> — ${room.description}`;

      if (room.background) {
        const bg = new Image();
        bg.onload = () => { roomEl.style.backgroundImage = `url(${resolveAsset(room.background)})`; };
        bg.onerror = () => { roomEl.style.backgroundImage = 'linear-gradient(160deg, rgba(255,255,255,.06), transparent 45%), radial-gradient(circle at 72% 30%, rgba(255,204,102,.18), transparent 22%)'; };
        bg.src = resolveAsset(room.background);
      }
      (room.entities || []).forEach(entity => drawEntity(room, entity));
    }

    fetch(resolveAsset('assets/rooms/intro/room.json'))
      .then(response => response.ok ? response.json() : fallbackRoom)
      .then(drawRoom)
      .catch(() => drawRoom(fallbackRoom));
  </script>
</body>
</html>
