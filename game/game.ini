[game]
title=YAAT Placeholder Demo
first_room=room000_start
default_language=en

[display]
width=320
height=200

[scripts]
startup=scripts/startup.yaat
global=scripts/global.yaat
inventory=scripts/inventory.yaat

[player]
idle=graphics/sprites/player_idle.bmp
idle_left=graphics/sprites/player_idle_left.bmp
idle_right=graphics/sprites/player_idle_right.bmp
walk_left=graphics/sprites/player_walk_left.bmp
walk_right=graphics/sprites/player_walk_right.bmp

[paths]
rooms=rooms
inventory=inventory/items.ini
strings=strings/en.ini

[player.animation.idle_left]
frame_ms=250
frames=graphics/sprites/player_idle_left.bmp

[player.animation.idle_right]
frame_ms=250
frames=graphics/sprites/player_idle_right.bmp

[player.animation.walk_left]
frame_ms=120
frames=graphics/sprites/player_walk_left.bmp;graphics/sprites/player_idle_left.bmp;graphics/sprites/player_walk_left.bmp

[player.animation.walk_right]
frame_ms=120
frames=graphics/sprites/player_walk_right.bmp;graphics/sprites/player_idle_right.bmp;graphics/sprites/player_walk_right.bmp
