[id]
name=room000_start
label=Start Screen

[display]
width=320
height=200
background=background.bmp
palette=../../palettes/main.pal

[scale]
near_y=190
near_scale=1.15
far_y=80
far_scale=0.65

[audio]
music=../../audio/music/intro.mid

[script]
file=script.yaat

[animation]
id=start_button_blink
frames=start_button_0.bmp;start_button_1.bmp;start_button_0.bmp
timing_ms=400;400;400
loop=true
state=idle
