<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="YAAT">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.webmanifest">
<title>YAAT HTML5</title>
<style>
  :root { color-scheme: dark; font-family: system-ui, sans-serif; background:#101018; color:#eee; }
  html, body { width:100%; height:100%; overscroll-behavior:none; touch-action:none; -webkit-text-size-adjust:100%; }
  body { margin:0; min-height:100vh; display:grid; place-items:center; overscroll-behavior:none; background:#000; touch-action:none; user-select:none; -webkit-user-select:none; -webkit-touch-callout:none; }
  main { position:relative; text-align:center; touch-action:none; user-select:none; -webkit-user-select:none; -webkit-touch-callout:none; }
  main:fullscreen { width:100vw; height:100vh; display:grid; place-items:center; background:#000; }
  main:fullscreen canvas { width:min(100vw, calc(100vh * 4 / 3)); height:auto; max-width:none; border:0; }
  canvas { width:min(96vw, 960px); max-height:calc(100vh - 4.5rem); image-rendering:pixelated; image-rendering:crisp-edges; border:2px solid #505060; background:#000; cursor:none; touch-action:none; }
  p { margin:.6rem 0 0; color:#b8b8c8; font-size:14px; }
  .controls { position:absolute; top:.45rem; right:.45rem; z-index:2; display:flex; flex-direction:column; align-items:flex-end; gap:.25rem; color:#f0f0ff; font-size:11px; text-align:right; background:rgba(16,16,24,.72); border:1px solid rgba(160,160,190,.55); border-radius:6px; padding:.35rem .45rem; }
  .controls label { display:flex; align-items:center; gap:.25rem; user-select:none; white-space:nowrap; }
  .controls button { color:#f0f0ff; background:#303040; border:1px solid #8080a0; border-radius:4px; padding:.2rem .45rem; font:inherit; }
  .controls button:active { background:#505068; }
  .controls input { width:13px; height:13px; margin:0; accent-color:#a0c8ff; }
  main:fullscreen .controls { position:fixed; top:.8rem; right:.8rem; }
  main:fullscreen p { position:fixed; left:50%; bottom:.8rem; transform:translateX(-50%); background:rgba(16,16,24,.75); padding:.35rem .6rem; border-radius:4px; }
</style>
</head>
<body>
<main>
  <canvas id="game" width="320" height="240" aria-label="YAAT placeholder demo"></canvas>
  <div class="controls" aria-live="polite">
    <button id="fullscreenBtn" type="button">Full screen</button>
    <label><input id="touchMode" type="checkbox"> Touch mode</label>
  </div>
</main>
<script type="module" src="game/scripts/main.js"></script>
</body>
</html>
