<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>YAAT HTML5</title>
<style>
  :root { color-scheme: dark; font-family: system-ui, sans-serif; background:#101018; color:#eee; }
  body { margin:0; min-height:100vh; display:grid; place-items:center; }
  main { text-align:center; }
  canvas { width:min(96vw, 960px); image-rendering:pixelated; image-rendering:crisp-edges; border:2px solid #505060; background:#000; cursor:none; }
  p { margin:.6rem 0 0; color:#b8b8c8; font-size:14px; }
</style>
</head>
<body>
<main>
  <canvas id="game" width="320" height="240" aria-label="YAAT placeholder demo"></canvas>
  <p>Left click playfield to interact. Choose verbs and inventory from the lower bar.</p>
</main>
<script type="module" src="src/js/browserHost.js"></script>
</body>
</html>
