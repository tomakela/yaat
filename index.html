<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="YAAT">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.webmanifest">
<title>YAAT HTML5</title>
<style>
  :root { color-scheme: dark; font-family: system-ui, sans-serif; background:#101018; color:#eee; }
  html, body { width:100%; height:100%; overscroll-behavior:none; touch-action:none; -webkit-text-size-adjust:100%; }
  body { margin:0; min-height:100vh; display:grid; place-items:center; overscroll-behavior:none; background:#000; touch-action:none; user-select:none; -webkit-user-select:none; -webkit-touch-callout:none; }
  main { position:relative; text-align:center; touch-action:none; user-select:none; -webkit-user-select:none; -webkit-touch-callout:none; }
  main:fullscreen { width:100vw; height:100vh; display:grid; place-items:center; background:#000; }
  main:fullscreen canvas { width:min(100vw, calc(100vh * 4 / 3)); height:auto; max-width:none; border:0; }
  canvas { width:min(96vw, 960px); max-height:calc(100vh - 4.5rem); image-rendering:pixelated; image-rendering:crisp-edges; border:2px solid #505060; background:#000; cursor:none; touch-action:none; }
  p { margin:.6rem 0 0; color:#b8b8c8; font-size:14px; }
  .controls { position:absolute; top:.45rem; right:.45rem; z-index:2; display:flex; flex-direction:column; align-items:flex-end; gap:.25rem; color:#f0f0ff; font-size:11px; text-align:right; background:rgba(16,16,24,.72); border:1px solid rgba(160,160,190,.55); border-radius:6px; padding:.35rem .45rem; }
  .controls label { display:flex; align-items:center; gap:.25rem; user-select:none; white-space:nowrap; }
  .controls button { color:#f0f0ff; background:#303040; border:1px solid #8080a0; border-radius:4px; padding:.2rem .45rem; font:inherit; }
  .controls button:active { background:#505068; }
  .controls input { width:13px; height:13px; margin:0; accent-color:#a0c8ff; }
  main:fullscreen .controls { position:fixed; top:.8rem; right:.8rem; }
  main:fullscreen p { position:fixed; left:50%; bottom:.8rem; transform:translateX(-50%); background:rgba(16,16,24,.75); padding:.35rem .6rem; border-radius:4px; }
</style>
</head>
<body>
<main>
  <canvas id="game" width="320" height="240" aria-label="YAAT placeholder demo"></canvas>
  <div class="controls" aria-live="polite">
    <button id="fullscreenBtn" type="button">Full screen</button>
    <label><input id="touchMode" type="checkbox"> Touch mode</label>
  </div>
</main>
<script>
(() => {
'use strict';
const W=320,H=240,PLAY_H=200,PLAYER_W=18,PLAYER_H=34,SPEED=4,SPLASH_MS=2000,DIALOG_MS=2400,TOUCH_CURSOR_SENSITIVITY=1.75,TOUCH_DRAG_THRESHOLD=3,TOUCH_LONGPRESS_MOVE_THRESHOLD=12,TOUCH_LONGPRESS_MS=550;
const canvas=document.getElementById('game'), main=document.querySelector('main'), fullscreenBtn=document.getElementById('fullscreenBtn'), touchModeInput=document.getElementById('touchMode'), ctx=canvas.getContext('2d'); ctx.imageSmoothingEnabled=false;
const touchState={active:false,id:-1,lastX:0,lastY:0,totalMove:0,moved:false,longTimer:0,longFired:false,suppressClickUntil:0,captureTarget:null};
touchModeInput.checked=true;
function isTouchMode(){ return touchModeInput.checked; }
function updateFullscreenButton(){ fullscreenBtn.textContent=document.fullscreenElement?'Exit full screen':'Full screen'; }
async function lockLandscapeIfPossible(){ try{ if(screen.orientation?.lock) await screen.orientation.lock('landscape'); }catch(_){} }
async function toggleFullscreen(){ if(document.fullscreenElement){ await document.exitFullscreen?.(); return; } await main.requestFullscreen?.(); await lockLandscapeIfPossible(); }
fullscreenBtn.addEventListener('click',()=>toggleFullscreen().catch(()=>{}));
touchModeInput.addEventListener('change',()=>{ touchState.active=false; clearTouchLongPress(); });
document.addEventListener('fullscreenchange',()=>{ updateFullscreenButton(); if(document.fullscreenElement) lockLandscapeIfPossible(); });
updateFullscreenButton();
function clearTouchLongPress(){ if(touchState.longTimer){ clearTimeout(touchState.longTimer); touchState.longTimer=0; } }
function endTouchCursor(e, triggerTap=true){ if(!touchState.active || e.pointerId!==touchState.id) return false; const wasDrag=touchState.moved, wasLong=touchState.longFired, wasTouchMode=isTouchMode(); touchState.active=false; clearTouchLongPress(); touchState.captureTarget?.releasePointerCapture?.(e.pointerId); touchState.captureTarget=null; if(wasTouchMode||wasLong) touchState.suppressClickUntil=performance.now()+500; if(wasTouchMode&&triggerTap&&!wasDrag&&!wasLong) triggerCursorClick(); return true; }
const imageCache=new Map();
function img(path){ if(!imageCache.has(path)){ const im=new Image(); im.src='game/'+path; imageCache.set(path,im);} return imageCache.get(path); }
function rect(x,y,w,h,c){ ctx.fillStyle=c; ctx.fillRect(x|0,y|0,w|0,h|0); }
function text(s,x,y,c='#f0e8d0'){ ctx.fillStyle=c; ctx.font='8px monospace'; ctx.textBaseline='top'; ctx.fillText(s,x,y); }
function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }
function canvasMetrics(){ const b=canvas.getBoundingClientRect(); const scale=Math.min(b.width/W,b.height/H)||1; const contentW=W*scale, contentH=H*scale; return {left:b.left+(b.width-contentW)/2, top:b.top+(b.height-contentH)/2, scale}; }
function canvasPoint(e){ const m=canvasMetrics(); return {x:clamp((e.clientX-m.left)/m.scale,0,W-1), y:clamp((e.clientY-m.top)/m.scale,0,H-1)}; }
function setCursorFromClient(e){ const p=canvasPoint(e); state.cx=p.x; state.cy=p.y; }
function moveCursorByClientDelta(dx,dy){ const m=canvasMetrics(); state.cx=clamp(state.cx+dx*TOUCH_CURSOR_SENSITIVITY/m.scale,0,W-1); state.cy=clamp(state.cy+dy*TOUCH_CURSOR_SENSITIVITY/m.scale,0,H-1); }
function hashColor(s, fallback){ let h=fallback; for (const ch of s) h=((h*33)^ch.charCodeAt(0))>>>0; return '#'+(h&0xffffff).toString(16).padStart(6,'0'); }
const verbs=['look','use','talk','take','open','close'];
const verbLabels={walk:'Walk to',look:'Look at',use:'Use',talk:'Talk to',take:'Take',open:'Open',close:'Close'};
const inventoryDefs={ brass_key:{name:'Brass Key', icon:'inventory/icons/brass_key.bmp', description:'A small brass key with worn teeth.'} };
const rooms={
  room000_start:{label:'Start Screen',bg:'rooms/room000_start/background.bmp',enter:'Welcome to the YAAT placeholder asset demo.',hotspots:[{id:'start_button',name:'Start Game',x:112,y:128,w:96,h:24,cursor:'use',click(){ play('audio/sfx/start_click.wav'); go('room001_intro',160,180); }}],objects:[]},
  room001_intro:{label:'Intro Room',bg:'rooms/room001_intro/background.bmp',enter(){ say('narrator', state.vars.intro_seen?'You are back in the quiet intro room.':'You stand in a room drawn only by placeholder data.'); state.vars.intro_seen=true; },hotspots:[
    {id:'faded_sign',name:'Faded Sign',x:24,y:40,w:80,h:32,cursor:'look',look(){ say('narrator','The sign reads: use the key on the locked door.'); },click(){ this.look(); }},
    {id:'locked_door',name:'Locked Door',x:268,y:48,w:40,h:112,cursor:'use',walkX:286,walkY:159,targetRoom:'room002_exit',targetX:160,targetY:180,requires(){return !state.vars.door_locked;},look(){ say('player',state.vars.door_locked?'The door is locked. There is a bright brass keyhole.':'The door is unlocked now.'); },use(){ if(state.selectedInv==='brass_key') return useKeyOnDoor(); if(state.vars.door_locked) say('player','It will not open without the right key.'); else go('room002_exit',160,180); },click(){ if(state.vars.door_locked) say('player','Locked. I should use something on it.'); else go('room002_exit',160,180); }}],
    objects:[{id:'brass_key',name:'Brass Key',sprite:'rooms/room001_intro/objects/brass_key.bmp',x:132,y:148,w:18,h:10,walkX:141,walkY:158,inventoryItem:'brass_key',visible(){return !state.vars.took_key;},look(){say('player','A small brass key is lying on the floor.');},click(){takeKey();},take(){takeKey();}}]},
  room002_exit:{label:'Exit Room',bg:'rooms/room002_exit/background.bmp',enter:'You step through the unlocked door into the exit room.',hotspots:[
    {id:'back_door',name:'Back Door',x:8,y:48,w:38,h:112,cursor:'use',targetRoom:'room001_intro',targetX:288,targetY:180,click(){go('room001_intro',288,180);},look(){say('player','That door leads back to the intro room.');}},
    {id:'ending_plaque',name:'Ending Plaque',x:112,y:72,w:96,h:48,cursor:'look',look(){say('narrator','The plaque waits for a final click.');},click(){ if(state.vars.demo_complete) say('narrator','The demo is already complete.'); else { state.vars.demo_complete=true; play('audio/sfx/demo_complete.wav'); say('narrator','Demo complete. Placeholder assets and metadata are consistent.'); } }}],
    objects:[{id:'exit_lamp',name:'Exit Lamp',sprite(){return state.vars.exit_lamp_lit?'rooms/room002_exit/objects/exit_lamp_lit.bmp':'rooms/room002_exit/objects/exit_lamp.bmp';},x:236,y:64,w:24,h:48,visible(){return true;},look(){say('player',state.vars.exit_lamp_lit?'The lamp is lit with a swapped sprite.':'The lamp is dim. The brass key might bridge its contacts.');},use(){if(state.selectedInv==='brass_key') return lightLamp(); this.look();},click(){this.look();}},{id:'demo_badge_dim',name:'Dim Demo Badge',sprite:'rooms/room002_exit/objects/demo_badge_dim.bmp',x:210,y:118,w:18,h:12,visible(){return !state.vars.exit_lamp_lit;},look(){say('narrator','This badge will be hidden when the lamp feature demo runs.');}},{id:'demo_badge_lit',name:'Lit Demo Badge',sprite:'rooms/room002_exit/objects/demo_badge_lit.bmp',x:210,y:118,w:18,h:12,visible(){return state.vars.exit_lamp_lit;},look(){say('narrator','This badge was shown by the lamp feature demo.');}}]}
};
const state={splashUntil:performance.now()+SPLASH_MS,room:'room000_start',px:160,py:100,tx:160,ty:100,face:1,cx:160,cy:100,verb:'walk',selectedInv:'',inv:[],vars:{door_locked:true,intro_seen:false,took_key:false,demo_complete:false,exit_lamp_lit:false},dialog:null,dialogUntil:0,sayQueue:[],actionSentence:'',actionUntil:0,shakeUntil:0,shakeMag:0,pending:null};
function showSay(speaker,msg){ state.dialog={speaker,msg,t:performance.now()}; state.dialogUntil=performance.now()+DIALOG_MS; }
function say(speaker,msg){ if(state.dialog) state.sayQueue.push({speaker,msg}); else showSay(speaker,msg); }
function advanceSay(){ const next=state.sayQueue.shift(); if(next) showSay(next.speaker,next.msg); else { state.dialog=null; state.dialogUntil=0; } }
function setActionSentence(text,ms=0){ state.actionSentence=text; state.actionUntil=ms>0?performance.now()+ms:0; }
function clearActionSentence(){ state.actionSentence=''; state.actionUntil=0; }
function tickActionSentence(){ if(state.actionSentence&&state.actionUntil&&performance.now()>=state.actionUntil) clearActionSentence(); }
function tickDialogue(){ if(state.dialog&&performance.now()>=state.dialogUntil) advanceSay(); tickActionSentence(); }
function play(path){ const a=new Audio('game/'+path); a.volume=0.7; a.play().catch(()=>{}); }
function shake(ms,mag){ state.shakeUntil=performance.now()+ms; state.shakeMag=mag; }
function go(id,x=160,y=180){ state.room=id; state.px=state.tx=x; state.py=state.ty=y; state.selectedInv=''; const e=rooms[id].enter; if(typeof e==='function') e(); else if(e) say('narrator',e); }
function takeKey(){ if(!state.inv.includes('brass_key')) state.inv.push('brass_key'); state.vars.took_key=true; play('audio/sfx/pickup_key.wav'); say('player','I picked up the brass key.'); }
function useKeyOnDoor(){ if(state.vars.door_locked){ play('audio/sfx/door_unlock.wav'); shake(350,6); state.vars.door_locked=false; say('player','The brass key turns, and the door unlocks.'); } else say('player','The door is already unlocked.'); }
function lightLamp(){ if(state.vars.exit_lamp_lit){ say('player','The lamp is already lit.'); return; } state.vars.exit_lamp_lit=true; state.inv=state.inv.filter(id=>id!=='brass_key'); state.selectedInv=''; say('player','The key completes the circuit, the lamp lights, and the key is spent.'); }
function deselectVerb(){ state.verb='walk'; state.selectedInv=''; }
function cant(verb){ const lines={look:"I don't see anything special.",use:"I can't use that.",talk:"I can't talk to that.",take:"I can't take that.",open:"I can't open that.",close:"I can't close that."}; say('player',lines[verb]||"I can't do that."); }
function roomItems(){ const r=rooms[state.room]; return [...r.hotspots, ...r.objects.filter(o=> typeof o.visible==='function'?o.visible():o.visible!==false)]; }
function at(x,y){ const a=roomItems(); for(let i=a.length-1;i>=0;i--){ const o=a[i]; if(x>=o.x&&y>=o.y&&x<o.x+o.w&&y<o.y+o.h) return o; } return null; }
function walkToObj(o){ state.tx=o.walkX??clamp(o.x+(o.w>>1),PLAYER_W/2,W-PLAYER_W/2); state.ty=o.walkY??clamp(o.y+o.h-1,PLAYER_H,PLAY_H-1); }
function canChangeRoom(o){ return !!(o&&o.targetRoom&&(!o.requires||o.requires())); }
function changeRoomFrom(o){ go(o.targetRoom,o.targetX??160,o.targetY??180); }
function playerExit(){ const r=rooms[state.room]; for(let i=r.hotspots.length-1;i>=0;i--){ const h=r.hotspots[i]; if(canChangeRoom(h)&&state.px>=h.x&&state.py>=h.y&&state.px<h.x+h.w&&state.py<h.y+h.h) return h; } return null; }
function interact(o){ if(!o) return; const verb=state.selectedInv?'use':state.verb; if(verb==='walk'){ if(canChangeRoom(o)) changeRoomFrom(o); else if(o.click) o.click.call(o); else cant(verb); clearActionSentence(); return; } if(verb==='use'&&!state.selectedInv&&o.inventoryItem){ if(o.click) o.click.call(o); else if(o.take) o.take.call(o); else cant(verb); clearActionSentence(); if(state.inv.includes(o.inventoryItem)){ state.verb='use'; state.selectedInv=o.inventoryItem; } return; } if(o[verb]) o[verb].call(o); else cant(verb); deselectVerb(); clearActionSentence(); }
function triggerCursorLongClick(){ if(performance.now()<state.splashUntil){ state.splashUntil=0; return; } const x=state.cx,y=state.cy; if(y>=PLAY_H){ const ii=state.inv.findIndex((_,i)=>x>=164+i*23&&x<184+i*23&&y>=PLAY_H+4&&y<PLAY_H+24); if(ii>=0){ const def=inventoryDefs[state.inv[ii]]; setActionSentence(`Look at ${def?.name||state.inv[ii]}`,1000); say('player',def?.description||`I have ${def?.name||state.inv[ii]}.`); } return; } const o=at(x,y); if(o){ setActionSentence(`Look at ${o.name}`,1000); if(o.longclick) o.longclick.call(o); else if(o.look) o.look.call(o); else cant('look'); } }
function update(){ const dx=state.tx-state.px, dy=state.ty-state.py, d=Math.hypot(dx,dy); if(d>0){ const step=Math.min(SPEED,d); state.px+=dx/d*step; state.py+=dy/d*step; if(dx<0) state.face=0; else if(dx>0) state.face=1; const exit=playerExit(); if(exit){ changeRoomFrom(exit); return; } } if(d<=SPEED && state.pending){ const p=state.pending; state.pending=null; interact(p); } else if(d<=SPEED&&!state.pending){ if(state.actionSentence&&!state.actionUntil) clearActionSentence(); const exit=playerExit(); if(exit) changeRoomFrom(exit); } }
function drawBmp(path,x,y,w,h){ const im=img(path); if(im.complete&&im.naturalWidth) ctx.drawImage(im,x,y,w||im.naturalWidth,h||im.naturalHeight); else { rect(x,y,w||24,h||24,hashColor(path,0x2f5f9e)); } }
function drawPlayer(sx,sy){ const moving=Math.abs(state.px-state.tx)+Math.abs(state.py-state.ty)>0.1; const path=moving?(state.face?'graphics/sprites/player_walk_right.bmp':'graphics/sprites/player_walk_left.bmp'):'graphics/sprites/player_idle.bmp'; const im=img(path); if(im.complete&&im.naturalWidth) ctx.drawImage(im,state.px-im.naturalWidth/2+sx,state.py-im.naturalHeight+sy); else { rect(state.px-11+sx,state.py+7+sy,22,5,'#664f38'); rect(state.px-5+sx,state.py-34+sy,10,10,'#5a3a24'); rect(state.px-6+sx,state.py-25+sy,12,15,'#2f5f9e'); rect(state.px-9+sx,state.py-22+sy,4,12,'#274774'); rect(state.px+5+sx,state.py-22+sy,4,12,'#274774'); rect(state.px-5+sx,state.py-10+sy,4,10,'#1f2430'); rect(state.px+1+sx,state.py-10+sy,4,10,'#1f2430'); } }
function drawSplash(){ rect(0,0,W,H,'#000'); ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.font='48px monospace'; ctx.fillStyle='#f0f0f0'; ctx.fillText('YAAT',W/2,H/2-18); ctx.font='16px monospace'; ctx.fillStyle='#a0c8ff'; ctx.fillText('Yet Another Adventure Tool',W/2,H/2+30); ctx.textAlign='start'; ctx.textBaseline='top'; }
function draw(){ tickDialogue(); const now=performance.now(); if(now<state.splashUntil){ drawSplash(); return; } let sx=0,sy=0; if(now<state.shakeUntil){ const m=Math.max(1,Math.round(state.shakeMag*(state.shakeUntil-now)/350)); sx=(Math.random()*m*2-m)|0; sy=(Math.random()*m*2-m)|0; } const r=rooms[state.room]; rect(0,0,W,H,hashColor(r.bg,0xd8c7a3)); drawBmp(r.bg,sx,sy,W,PLAY_H); for(const h of r.hotspots){ rect(h.x+sx,h.y+sy,h.w,h.h,'rgba(240,208,32,.45)'); rect(h.x+1+sx,h.y+1+sy,Math.max(0,h.w-2),Math.max(0,h.h-2),'rgba(192,128,32,.35)'); } for(const o of r.objects){ if(typeof o.visible==='function'&&!o.visible()) continue; drawBmp(typeof o.sprite==='function'?o.sprite():o.sprite,o.x+sx,o.y+sy,o.w,o.h); } drawPlayer(sx,sy); drawUI(); drawDialogue(); drawCursor(); }
function drawUI(){ rect(0,PLAY_H,W,40,'#101018'); verbs.forEach((v,i)=>{ const x=4+(i%3)*50,y=PLAY_H+3+(i/3|0)*15; rect(x,y,48,13,v===state.verb?'#6a5430':'#303040'); text(v,x+5,y+3); }); state.inv.forEach((id,i)=>{ const x=164+i*23,y=PLAY_H+4; rect(x,y,20,20,id===state.selectedInv?'#806020':'#404048'); rect(x+1,y+1,18,18,'#202028'); drawBmp(inventoryDefs[id].icon,x+2,y+2,16,16); }); const hover=state.cy<PLAY_H&&at(state.cx,state.cy); const command=state.selectedInv?`Use ${inventoryDefs[state.selectedInv].name} with `:(verbLabels[state.verb]||state.verb)+' '; text(state.actionSentence||command+(hover?hover.name:''),164,PLAY_H+28,'#d8d0b8'); }
function drawDialogue(){ if(!state.dialog) return; rect(16,10,288,20,'rgba(0,0,0,.75)'); text(state.dialog.msg,24,17,'#fff'); }
function drawCursor(){ const use=(at(state.cx,state.cy)?.cursor==='use')||state.selectedInv||state.verb==='use'; rect(state.cx,state.cy,2,14,'#000'); rect(state.cx+2,state.cy+2,2,10,'#000'); rect(state.cx+4,state.cy+4,2,8,'#000'); rect(state.cx+6,state.cy+6,2,6,'#000'); rect(state.cx+8,state.cy+8,2,4,'#000'); rect(state.cx+1,state.cy+1,1,11,use?'#ffe070':'#fff'); rect(state.cx+2,state.cy+3,2,7,use?'#ffe070':'#fff'); rect(state.cx+4,state.cy+5,2,5,use?'#ffe070':'#fff'); rect(state.cx+6,state.cy+7,2,3,use?'#ffe070':'#fff'); }
function triggerCursorClick(){ if(performance.now()<state.splashUntil){ state.splashUntil=0; return; } if(state.dialog||state.sayQueue.length){ advanceSay(); return; } const x=state.cx,y=state.cy; if(y>=PLAY_H){ const vi=verbs.findIndex((_,i)=> x>=4+(i%3)*50&&x<52+(i%3)*50&&y>=PLAY_H+3+(i/3|0)*15&&y<PLAY_H+16+(i/3|0)*15); if(vi>=0){ state.verb=verbs[vi]; state.selectedInv=''; return; } const ii=state.inv.findIndex((_,i)=>x>=164+i*23&&x<184+i*23&&y>=PLAY_H+4&&y<PLAY_H+24); if(ii>=0){ state.selectedInv=state.inv[ii]; state.verb='use'; return; } return; } const o=at(x,y); if(o){ const command=state.selectedInv?`Use ${inventoryDefs[state.selectedInv].name} with `:(verbLabels[state.verb]||state.verb)+' '; setActionSentence(command+o.name); if(state.verb==='look'&&!state.selectedInv){ interact(o); } else { walkToObj(o); state.pending=state.verb==='walk'&&!state.selectedInv&&o.inventoryItem?null:o; } } else { clearActionSentence(); state.pending=null; if(state.selectedInv||state.verb!=='walk'){ deselectVerb(); return; } state.tx=clamp(x,PLAYER_W/2,W-PLAYER_W/2); state.ty=clamp(y,PLAYER_H,PLAY_H-1); } }
function isControlEvent(e){ return e.target.closest?.('.controls'); }
canvas.addEventListener('mousemove',e=>setCursorFromClient(e));
canvas.addEventListener('click',e=>{ if(performance.now()<touchState.suppressClickUntil) return; setCursorFromClient(e); triggerCursorClick(); });
document.addEventListener('contextmenu',e=>{ if(!isControlEvent(e)) e.preventDefault(); },{passive:false});
document.addEventListener('selectstart',e=>{ if(!isControlEvent(e)) e.preventDefault(); },{passive:false});
document.addEventListener('pointerdown',e=>{ if(isControlEvent(e)||e.pointerType==='mouse'||e.button>0) return; touchState.active=true; touchState.id=e.pointerId; touchState.lastX=e.clientX; touchState.lastY=e.clientY; touchState.totalMove=0; touchState.moved=false; touchState.longFired=false; touchState.captureTarget=e.target; if(!isTouchMode()) setCursorFromClient(e); clearTouchLongPress(); touchState.longTimer=setTimeout(()=>{ if(touchState.active&&touchState.id===e.pointerId&&!touchState.moved){ if(!isTouchMode()) setCursorFromClient(e); touchState.longFired=true; touchState.longTimer=0; triggerCursorLongClick(); } },TOUCH_LONGPRESS_MS); touchState.captureTarget?.setPointerCapture?.(e.pointerId); if(isTouchMode()) e.preventDefault(); },{passive:false});
document.addEventListener('pointermove',e=>{ if(!touchState.active || e.pointerId!==touchState.id) return; const dx=e.clientX-touchState.lastX, dy=e.clientY-touchState.lastY; touchState.totalMove+=Math.hypot(dx,dy); if(touchState.totalMove>(isTouchMode()?TOUCH_DRAG_THRESHOLD:TOUCH_LONGPRESS_MOVE_THRESHOLD)){ touchState.moved=true; clearTouchLongPress(); } if(isTouchMode()) moveCursorByClientDelta(dx,dy); else setCursorFromClient(e); touchState.lastX=e.clientX; touchState.lastY=e.clientY; if(isTouchMode()||touchState.longFired) e.preventDefault(); },{passive:false});
document.addEventListener('pointerup',e=>{ if(!endTouchCursor(e)) return; if(isTouchMode()||touchState.longFired) e.preventDefault(); },{passive:false});
document.addEventListener('pointercancel',e=>{ if(endTouchCursor(e,false)) e.preventDefault(); },{passive:false});
if('serviceWorker' in navigator){ window.addEventListener('load',()=>{ navigator.serviceWorker.register('./sw.js').then(reg=>reg.update()).catch(()=>{}); }); }
function loop(){ update(); draw(); requestAnimationFrame(loop); }
go('room000_start',160,100); loop();
})();
</script>
</body>
</html>
